<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sygnały Giełdowe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-icon">▲</span>
      <span class="logo-text">SIGNAL<span class="accent">BOARD</span></span>
    </div>
    <div class="market-ticker" id="marketTicker">
      <span class="ticker-item">NASDAQ <span class="up">+0.82%</span></span>
      <span class="ticker-item">S&P500 <span class="up">+0.54%</span></span>
      <span class="ticker-item">DOW <span class="down">−0.11%</span></span>
    </div>
  </header>

  <main>

    <!-- NEWS SECTION -->
    <section class="panel news-panel">
      <div class="panel-header">
        <span class="panel-label">📡 NEWSY</span>
        <span class="panel-hint">Wpisz ticker, np. NVDA, AAPL</span>
      </div>
      <div class="search-row">
        <input id="ticker" type="text" placeholder="Ticker (np. NVDA)" autocomplete="off" />
        <button onclick="search()">Szukaj</button>
      </div>
      <div id="result" class="result-box">
        <span class="placeholder-text">Tu pojawią się newsy...</span>
      </div>
    </section>

    <!-- CHART SECTION -->
    <section class="panel chart-panel">
      <div class="panel-header">
        <span class="panel-label">📈 WYKRES</span>
        <span class="panel-hint">Format: NASDAQ:NVDA</span>
      </div>
      <div class="search-row">
        <input id="chartTicker" type="text" placeholder="np. NASDAQ:NVDA" value="NASDAQ:NVDA" autocomplete="off" />
        <button onclick="loadChart()">Załaduj</button>
      </div>
      <div id="tvchart"></div>
      <section class="panel" style="margin-top:20px;">
  <div class="panel-header">
    <span class="panel-label">🔔 ALARMY</span>
    <span class="panel-hint">Dodaj poziom ceny dla wybranego tickera</span>
  </div>

  <div class="search-row">
  <input id="alertTicker" type="text" placeholder="Ticker, np. NVDA lub NASDAQ:NVDA">
  <input id="alertPrice" type="number" step="0.01" placeholder="Cena, np. 180">
  
  <select id="alertCondition">
    <option value="above">Powyżej</option>
    <option value="below">Poniżej</option>
  </select>

  <button onclick="addAlert()">Dodaj alarm</button>
  <button onclick="testTelegramAlert()">Test Telegram</button>
  </div>

  <div id="alertsList" class="result-box">
    <span class="placeholder-text">Tu pojawią się alarmy...</span>
  </div>
      </section>
    </section>

  </main>

  <footer>
    <span>© 2025 SignalBoard &nbsp;|&nbsp; Tylko do celów informacyjnych</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
